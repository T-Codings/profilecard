<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="image-div">
            <img src="image/Pro-img.png" alt="Profile Picture">
        </div>

        <h1>Nyang</h1>
        <h2>WEB DEVELOPER</h2>
        <p>Hi, my name is Nyang, I am learning web development and building projects step by step.</p>
        
        <div class="hub-div">
          <h3>HOBBIES</h3>

          <div class="hobbies">
            <button>Coding</button>
            <button>Reading</button>
            <button>Basketball</button>
          </div>
        </div>

        <div class="links">
            <a href="https://github.com/" target="_blank" rel="noopener" class="link-btn"><button>Github</button></a>
            <a href="https://linkedin.com/" target="_blank" rel="noopener" class="link-btn"><button>LinkedIn</button></a>
        </div >

        <div class="hello-div">
        <button class="hello">Say Hello</button>

        </div>

          <div class="visit">Thanks for visiting my page</div>

    </div>
        <script src="script.js"></script>

</body>
</html>
